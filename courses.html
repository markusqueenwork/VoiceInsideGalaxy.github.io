<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Все курсы — Voice Inside Galaxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="site-header">
  <div class="logo"><a href="index.html">VOICE INSIDE <span>GALAXY</span></a></div>
  <div class="right-group">
    <button class="header-btn" id="regBtn">РЕГИСТРАЦИЯ</button>
    <button class="header-btn" id="cartIconBtn">КОРЗИНА <span id="cartCountBadge" class="cart-badge">0</span></button>
    <div class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <div class="menu-header">НАВИГАЦИЯ</div>
  <ul class="menu-list">
    <li><a href="index.html">ГЛАВНАЯ</a></li>
    <li><a href="courses.html">ВСЕ КУРСЫ</a></li>
    <li><a href="index.html#socials">СОЦ СЕТИ</a></li>
    <li><a href="index.html#docs">ДОКУМЕНТЫ</a></li>
  </ul>
  <div style="margin-top: 40px; font-size: 11px; color: #444;">© 2025</div>
</div>

<div class="cart-panel" id="cartPanel">
  <div class="cart-title"><span>КОРЗИНА</span><button class="close-cart" id="closeCartBtn">✕</button></div>
  <div class="cart-items" id="cartItemsList"><div class="empty-cart">Корзина пуста</div></div>
  <div class="cart-total" id="cartTotal">ИТОГО: 0 ₽</div>
  <button class="cart-btn-yellow" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<div class="modal" id="regModal">
  <div class="modal-content">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <h3>РЕГИСТРАЦИЯ</h3>
    <input type="text" id="regName" placeholder="Имя">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Пароль">
    <button class="modal-btn" id="doRegisterBtn">СОЗДАТЬ АККАУНТ</button>
  </div>
</div>

<main>
<div class="container">
  <div class="hero" style="margin-bottom: 40px;">
    <h1>Все <span>курсы</span></h1>
    <p>Выбери направление и уровень подготовки</p>
  </div>
  <div class="cards-grid" id="allCoursesContainer"></div>
</div>
<footer>
  <p>VOICE INSIDE GALAXY — онлайн школа музыкального продакшна</p>
  <p style="margin-top: 6px;">hello@voicegalaxy.ru</p>
</footer>
</main>

<script src="script.js"></script>
<script src="cart.js"></script>
<script>
  const courses = [
    {id:1,name:"Ableton Live с нуля",level:"beginner",levelName:"НОВИЧОК",price:4900,desc:"Полный курс по Ableton Live: интерфейс, запись, аранжировка",cover:"AL.png",duration:"8 часов"},
    {id:2,name:"Сведение и мастеринг",level:"intermediate",levelName:"ОПЫТНЫЙ",price:6900,desc:"Профессиональное сведение треков",cover:null,duration:"12 часов"},
    {id:3,name:"Продакшн Techno",level:"intermediate",levelName:"ОПЫТНЫЙ",price:5900,desc:"Создание техно-треков",cover:null,duration:"10 часов"},
    {id:4,name:"Вокал в электронике",level:"beginner",levelName:"НОВИЧОК",price:4500,desc:"Техники вокала для электронной музыки",cover:null,duration:"6 часов"},
    {id:5,name:"Звуковой дизайн",level:"pro",levelName:"ПРОФИ",price:8900,desc:"Создание уникальных звуков",cover:null,duration:"14 часов"},
    {id:6,name:"FL Studio с нуля",level:"beginner",levelName:"НОВИЧОК",price:4900,desc:"Полное руководство по FL Studio",cover:null,duration:"7 часов"}
  ];

  function renderCard(c) {
    const lvlClass = c.level === 'beginner' ? 'level-beginner' : (c.level === 'intermediate' ? 'level-intermediate' : 'level-pro');
    const coverStyle = c.cover ? `background-image: url('${c.cover}')` : 'background-color:#1a1a1a';
    return `
      <a href="course-detail.html?id=${c.id}" class="course-card">
        <div class="course-cover" style="${coverStyle};background-size:cover;background-position:center"></div>
        <div class="course-info">
          <div class="course-header">
            <span class="course-name">${c.name}</span>
            <span class="level-badge ${lvlClass}">${c.levelName}</span>
          </div>
          <div class="course-description">${c.desc}</div>
          <div class="course-meta">
            <span class="course-duration">🕒 ${c.duration}</span>
            <span class="course-price">${c.price.toLocaleString()} ₽</span>
          </div>
          <button class="add-to-cart-btn" data-id="${c.id}" data-name="${c.name}" data-price="${c.price}">В КОРЗИНУ</button>
        </div>
      </a>
    `;
  }

  function renderAllCourses() {
    document.getElementById('allCoursesContainer').innerHTML = courses.map(c => renderCard(c)).join('');
    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseInt(btn.dataset.price);
        addToCart({ id, name, price });
      };
    });
  }

  // Обработчики
  document.getElementById('burgerBtn').onclick = toggleSideMenu;
  document.getElementById('cartIconBtn').onclick = (e) => { e.stopPropagation(); toggleCart(); };
  document.getElementById('closeCartBtn').onclick = closeCart;
  document.getElementById('regBtn').onclick = openRegModal;
  document.getElementById('closeModalBtn').onclick = closeRegModal;
  document.getElementById('checkoutBtn').onclick = () => { if(cart.length === 0) alert('Корзина пуста'); else alert('Спасибо за заказ! Менеджер свяжется с вами.'); };
  document.getElementById('doRegisterBtn').onclick = () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) alert('Заполните все поля');
    else if (password.length < 4) alert('Пароль минимум 4 символа');
    else { alert(`Добро пожаловать, ${name}!`); closeRegModal(); }
  };

  renderAllCourses();
</script>
</body>
</html>
