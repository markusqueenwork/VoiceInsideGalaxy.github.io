<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Курс — Voice Inside Galaxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .course-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 0;
    }
    .course-detail-header {
      margin-bottom: 40px;
    }
    .course-detail-cover {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 24px;
      background-color: #1a1a1a;
    }
    .course-detail-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .course-detail-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .course-detail-duration {
      color: var(--accent);
      font-weight: 600;
    }
    .course-detail-price {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin: 24px 0;
    }
    .course-detail-desc {
      color: #a0a0a0;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .modules-section {
      margin-top: 40px;
    }
    .modules-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .module-item {
      margin-bottom: 32px;
      background: #111;
      border-radius: var(--radius-sm);
      padding: 20px;
      border: 1px solid var(--border);
    }
    .module-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .lesson-list {
      list-style: none;
    }
    .lesson-list li {
      color: #a0a0a0;
      padding: 8px 0;
      padding-left: 24px;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
    }
    .lesson-list li:last-child { border-bottom: none; }
    .lesson-list li:before {
      content: "▹";
      color: var(--accent);
      position: absolute;
      left: 0;
    }
    .detail-add-to-cart {
      background: var(--accent);
      border: none;
      padding: 16px 32px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      margin-top: 32px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: var(--accent);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .course-detail { padding: 20px 0; }
      .course-detail-title { font-size: 1.5rem; }
      .modules-title { font-size: 1.2rem; }
      .module-name { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="site-header">
  <div class="logo"><a href="index.html">VOICE INSIDE <span>GALAXY</span></a></div>
  <div class="right-group">
    <button class="header-btn" id="regBtn">РЕГИСТРАЦИЯ</button>
    <button class="header-btn" id="cartIconBtn">КОРЗИНА <span id="cartCountBadge" class="cart-badge">0</span></button>
    <div class="burger-btn" id="burgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <div class="menu-header">НАВИГАЦИЯ</div>
  <ul class="menu-list">
    <li><a href="index.html">ГЛАВНАЯ</a></li>
    <li><a href="courses.html">ВСЕ КУРСЫ</a></li>
    <li><a href="index.html#info">ИНФОРМАЦИЯ</a></li>
    <li><a href="index.html#socials">СОЦ СЕТИ</a></li>
    <li><a href="index.html#docs">ДОКУМЕНТЫ</a></li>
  </ul>
  <div style="margin-top: 40px; font-size: 11px; color: #444;">© 2025</div>
</div>

<div class="cart-panel" id="cartPanel">
  <div class="cart-title"><span>КОРЗИНА</span><button class="close-cart" id="closeCartBtn">✕</button></div>
  <div class="cart-items" id="cartItemsList"><div class="empty-cart">Корзина пуста</div></div>
  <div class="cart-total" id="cartTotal">ИТОГО: 0 ₽</div>
  <button class="cart-btn-yellow" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<div class="modal" id="regModal">
  <div class="modal-content">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <h3>РЕГИСТРАЦИЯ</h3>
    <input type="text" id="regName" placeholder="Имя">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Пароль">
    <button class="modal-btn" id="doRegisterBtn">СОЗДАТЬ АККАУНТ</button>
  </div>
</div>

<main>
<div class="container">
  <div class="course-detail" id="courseDetail">
    <!-- Контент загружается через JS -->
    <div style="text-align: center; padding: 60px;">Загрузка...</div>
  </div>
</div>
<footer>
  <p>VOICE INSIDE GALAXY — онлайн школа музыкального продакшна</p>
  <p style="margin-top: 6px;">hello@voicegalaxy.ru</p>
</footer>
</main>

<script src="script.js"></script>
<script src="cart.js"></script>
<script>
  // Данные курсов с модулями
  const coursesData = [
    {
      id: 1, name: "Ableton Live с нуля", level: "beginner", levelName: "НОВИЧОК", price: 4900,
      desc: "Полный курс по Ableton Live: интерфейс, запись, аранжировка, эффекты",
      cover: "AL.png", duration: "8 часов",
      modules: [
        { name: "Модуль 1: Интерфейс и настройка", lessons: ["Обзор окон Arrangement и Session", "Настройка аудио и MIDI", "Браузер и поиск звуков"] },
        { name: "Модуль 2: Запись и редактирование", lessons: ["Запись аудио и MIDI", "Редактирование нот", "Работа с лупами и сэмплами"] },
        { name: "Модуль 3: Эффекты и обработка", lessons: ["EQ, компрессор, реверберация", "Создание эффектовых цепочек", "Return-треки"] }
      ]
    },
    {
      id: 2, name: "Сведение и мастеринг", level: "intermediate", levelName: "ОПЫТНЫЙ", price: 6900,
      desc: "Профессиональное сведение треков, работа с динамикой и частотным балансом",
      cover: null, duration: "12 часов",
      modules: [
        { name: "Модуль 1: Баланс и панорама", lessons: ["Громкостной баланс", "Панорамирование", "Проверка моно-совместимости"] },
        { name: "Модуль 2: Частотная обработка", lessons: ["Эквалайзинг", "Убираем резонансы", "Создание пространства"] },
        { name: "Модуль 3: Динамическая обработка", lessons: ["Компрессия", "Параллельная компрессия", "Мастеринг-цепочка"] }
      ]
    },
    {
      id: 3, name: "Продакшн Techno", level: "intermediate", levelName: "ОПЫТНЫЙ", price: 5900,
      desc: "Создание драйвовых техно-треков, работа с драм-машинами и синтезаторами",
      cover: null, duration: "10 часов",
      modules: [
        { name: "Модуль 1: Барабаны и ритм", lessons: ["Создание kick и bass", "Паттерны для техно", "Работа с драм-машинами"] },
        { name: "Модуль 2: Синтез и текстуры", lessons: ["Создание bassline", "Эволюция синтезатора", "Шумы и атмосфера"] },
        { name: "Модуль 3: Аранжировка", lessons: ["Структура трека", "Автоматизации", "Финальная полировка"] }
      ]
    },
    {
      id: 4, name: "Вокал в электронике", level: "beginner", levelName: "НОВИЧОК", price: 4500,
      desc: "Техники вокала для house, techno, synthwave",
      cover: null, duration: "6 часов",
      modules: [
        { name: "Модуль 1: Подготовка голоса", lessons: ["Распевки и дыхание", "Микрофонная техника", "Защита голоса"] },
        { name: "Модуль 2: Обработка вокала", lessons: ["Pitch-коррекция", "Эффекты для электронного вокала", "Вокальные chops"] },
        { name: "Модуль 3: Работа в треке", lessons: ["Запись для клубного трека", "Вокальные сэмплы"] }
      ]
    },
    {
      id: 5, name: "Звуковой дизайн", level: "pro", levelName: "ПРОФИ", price: 8900,
      desc: "Создание уникальных звуков с нуля, синтез, сэмплирование",
      cover: null, duration: "14 часов",
      modules: [
        { name: "Модуль 1: Основы синтеза", lessons: ["Субтрактивный синтез", "FM-синтез", "Wavetable и гранулярный синтез"] },
        { name: "Модуль 2: Создание патчей", lessons: ["Басы", "Лиды", "Пэды"] },
        { name: "Модуль 3: Эффекты", lessons: ["Ревёрс и глитч", "Создание переходов", "Уникальные эффекты"] }
      ]
    },
    {
      id: 6, name: "FL Studio с нуля", level: "beginner", levelName: "НОВИЧОК", price: 4900,
      desc: "Полное руководство по FL Studio для начинающих продюсеров",
      cover: null, duration: "7 часов",
      modules: [
        { name: "Модуль 1: Интерфейс", lessons: ["Step Sequencer и Piano Roll", "Playlist и микшер", "Браузер"] },
        { name: "Модуль 2: Создание бита", lessons: ["Драм-паттерны", "Мелодии", "Аранжировка"] },
        { name: "Модуль 3: Микширование", lessons: ["Эффекты и автоматизация", "Отправка на эффекты", "Экспорт"] }
      ]
    }
  ];

  function getCourseId() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('id'));
  }

  function renderCourseDetail() {
    const id = getCourseId();
    const course = coursesData.find(c => c.id === id);
    
    if (!course) {
      document.getElementById('courseDetail').innerHTML = '<div style="text-align:center;padding:60px;"><h2>Курс не найден</h2><a href="courses.html" style="color:#FFCC00;">Вернуться к курсам</a></div>';
      return;
    }

    const lvlClass = course.level === 'beginner' ? 'level-beginner' : (course.level === 'intermediate' ? 'level-intermediate' : 'level-pro');
    const coverHtml = course.cover ? `<img class="course-detail-cover" src="${course.cover}" alt="${course.name}">` : '<div class="course-detail-cover" style="background:#1a1a1a; display:flex;align-items:center;justify-content:center;">📀</div>';
    
    let modulesHtml = '';
    course.modules.forEach(module => {
      const lessonsHtml = module.lessons.map(lesson => `<li>${lesson}</li>`).join('');
      modulesHtml += `
        <div class="module-item">
          <div class="module-name">${module.name}</div>
          <ul class="lesson-list">${lessonsHtml}</ul>
        </div>
      `;
    });

    const html = `
      <a href="courses.html" class="back-link">← Назад к курсам</a>
      <div class="course-detail-header">
        ${coverHtml}
        <h1 class="course-detail-title">${course.name}</h1>
        <div class="course-detail-meta">
          <span class="course-detail-duration">🕒 ${course.duration}</span>
          <span class="level-badge ${lvlClass}">${course.levelName}</span>
        </div>
        <div class="course-detail-desc">${course.desc}</div>
        <div class="course-detail-price">${course.price.toLocaleString()} ₽</div>
        <button class="detail-add-to-cart" id="detailAddToCartBtn">ДОБАВИТЬ В КОРЗИНУ</button>
      </div>
      <div class="modules-section">
        <div class="modules-title">Программа курса</div>
        ${modulesHtml}
      </div>
    `;
    
    document.getElementById('courseDetail').innerHTML = html;
    
    document.getElementById('detailAddToCartBtn').onclick = () => {
      addToCart({ id: course.id, name: course.name, price: course.price });
    };
  }

  // Обработчики
  document.getElementById('burgerBtn').onclick = toggleSideMenu;
  document.getElementById('cartIconBtn').onclick = (e) => { e.stopPropagation(); toggleCart(); };
  document.getElementById('closeCartBtn').onclick = closeCart;
  document.getElementById('regBtn').onclick = openRegModal;
  document.getElementById('closeModalBtn').onclick = closeRegModal;
  document.getElementById('checkoutBtn').onclick = () => { if(cart.length === 0) alert('Корзина пуста'); else alert('Спасибо за заказ! Менеджер свяжется с вами.'); };
  document.getElementById('doRegisterBtn').onclick = () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) alert('Заполните все поля');
    else if (password.length < 4) alert('Пароль минимум 4 символа');
    else { alert(`Добро пожаловать, ${name}!`); closeRegModal(); }
  };

  renderCourseDetail();
</script>
</body>
</html>
