<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Соц сети — Voice Inside Galaxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .socials-page { min-height: 70vh; padding: 60px 20px; }
    .socials-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
    @media (min-width: 768px) { .socials-title { font-size: 2.5rem; } }
    .socials-title span { color: var(--accent); }
    .socials-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 600px; margin: 0 auto; }
    .social-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; text-align: center; transition: 0.25s; text-decoration: none; display: block; min-width: 180px; }
    @media (min-width: 768px) { .social-card { padding: 24px 32px; min-width: 220px; } }
    .social-card:hover { transform: translateY(-6px); border-color: var(--accent); }
    .social-icon { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; margin: 0 auto 16px; display: block; }
    @media (min-width: 768px) { .social-icon { width: 80px; height: 80px; border-radius: 20px; } }
    .social-name { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 8px; }
    @media (min-width: 768px) { .social-name { font-size: 1.3rem; } }
    .profile-badge { display: none; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 4px 12px 4px 16px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.25); cursor: pointer; }
    .profile-badge.show { display: flex; }
    .profile-name { font-size: 0.8rem; font-weight: 500; color: var(--accent); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .profile-avatar { width: 28px; height: 28px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 700; font-size: 0.75rem; }
    .footer-offer { color: #6a6a6a; text-decoration: none; }
    .footer-offer:hover { color: var(--accent); text-decoration: underline; }
  </style>
</head>
<body>

<div class="site-header">
  <div class="logo"><a href="index.html">VOICE INSIDE <span>GALAXY</span></a></div>
  <div class="right-group">
    <div class="profile-badge" id="profileBadge">
      <span class="profile-name" id="profileName"></span>
      <div class="profile-avatar" id="profileAvatar"></div>
    </div>
    <button class="icon-btn" id="regBtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
    <div class="cart-icon-wrapper">
      <button class="icon-btn" id="cartIconBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </button>
      <span class="cart-badge-overlay" id="cartCountBadge">0</span>
    </div>
    <div class="burger-btn" id="burgerBtn">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <div class="menu-header">НАВИГАЦИЯ</div>
  <ul class="menu-list">
    <li><a href="index.html">ГЛАВНАЯ</a></li>
    <li><a href="courses.html">ВСЕ КУРСЫ</a></li>
    <li><a href="socials.html">СОЦ СЕТИ</a></li>
    <li><a href="docs.html">ДОКУМЕНТЫ</a></li>
  </ul>
  <div style="margin-top: 40px; font-size: 11px; color: #444;">© 2025</div>
</div>

<div class="cart-panel" id="cartPanel">
  <div class="cart-title"><span>КОРЗИНА</span><button class="close-cart" id="closeCartBtn">✕</button></div>
  <div class="cart-items" id="cartItemsList"><div class="empty-cart">Корзина пуста</div></div>
  <div class="cart-total" id="cartTotal">ИТОГО: 0 ₽</div>
  <button class="cart-btn-yellow" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<div class="modal" id="regModal">
  <div class="modal-content">
    <span class="close-modal" id="closeModalBtn">&times;</span>
    <h3>РЕГИСТРАЦИЯ</h3>
    <input type="text" id="regName" placeholder="Имя">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Пароль">
    <button class="modal-btn" id="doRegisterBtn">СОЗДАТЬ АККАУНТ</button>
  </div>
</div>

<main>
<div class="container">
  <div class="socials-page">
    <h1 class="socials-title">Наши <span>соцсети</span></h1>
    <div class="socials-grid">
      <a href="https://t.me/voiceinsidegalaxy_bot" class="social-card" target="_blank">
        <img src="tg.png" class="social-icon" alt="Telegram" onerror="this.style.display='none'">
        <div class="social-name">Telegram</div>
      </a>
      <a href="https://youtube.com/@v.i.galaxy?si=m9M9PJJFvdE3QoKz" class="social-card" target="_blank">
        <img src="yt.png" class="social-icon" alt="YouTube" onerror="this.style.display='none'">
        <div class="social-name">YouTube</div>
      </a>
    </div>
  </div>
</div>
<footer>
  <p><a href="oferta.docx" class="footer-offer" target="_blank">Публичная оферта</a></p>
  <p style="margin-top: 6px; font-size: 0.7rem;">© 2026 Voice Inside Galaxy</p>
</footer>
</main>

<script src="script.js"></script>
<script src="cart.js"></script>
<script>
  let currentUser = null;
  function loadUsers() { const users = localStorage.getItem('voiceGalaxyUsers'); return users ? JSON.parse(users) : []; }
  function saveUsers(users) { localStorage.setItem('voiceGalaxyUsers', JSON.stringify(users)); }
  function saveCurrentUser(user) { localStorage.setItem('voiceGalaxyCurrentUser', JSON.stringify(user)); currentUser = user; }
  function loadCurrentUser() { const user = localStorage.getItem('voiceGalaxyCurrentUser'); if (user) { currentUser = JSON.parse(user); updateProfileUI(); } }
  function updateProfileUI() {
    const badge = document.getElementById('profileBadge'); const regBtn = document.getElementById('regBtn');
    if (currentUser) {
      if (badge) badge.classList.add('show');
      const nameSpan = document.getElementById('profileName'); const avatarDiv = document.getElementById('profileAvatar');
      if (nameSpan) nameSpan.innerText = currentUser.name;
      if (avatarDiv) avatarDiv.innerText = currentUser.name.charAt(0).toUpperCase();
      if (regBtn) regBtn.style.display = 'none';
    } else {
      if (badge) badge.classList.remove('show');
      if (regBtn) regBtn.style.display = 'flex';
    }
  }
  document.getElementById('burgerBtn').onclick = () => { if (typeof toggleSideMenu === 'function') toggleSideMenu(); };
  document.getElementById('cartIconBtn').onclick = (e) => { e.stopPropagation(); if (typeof toggleCart === 'function') toggleCart(); };
  document.getElementById('closeCartBtn').onclick = () => { if (typeof closeCart === 'function') closeCart(); };
  document.getElementById('regBtn').onclick = () => { document.getElementById('regModal').classList.add('active'); };
  document.getElementById('closeModalBtn').onclick = () => { document.getElementById('regModal').classList.remove('active'); };
  document.getElementById('checkoutBtn').onclick = () => { if (cart.length === 0) alert('Корзина пуста'); else alert('Спасибо за заказ! Менеджер свяжется с вами.'); };
  document.getElementById('doRegisterBtn').onclick = () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) alert('Заполните все поля');
    else if (password.length < 4) alert('Пароль минимум 4 символа');
    else {
      const users = loadUsers();
      if (users.find(u => u.email === email)) alert('Пользователь с таким email уже существует');
      else {
        const newUser = { id: Date.now(), name, email, password, purchasedCourses: [], courseProgress: {}, completedLessons: 0 };
        users.push(newUser); saveUsers(users); saveCurrentUser(newUser);
        alert(`Добро пожаловать, ${name}!`); document.getElementById('regModal').classList.remove('active'); updateProfileUI();
      }
    }
  };
  loadCurrentUser(); if (typeof updateCartUI === 'function') updateCartUI();
</script>
</body>
</html>
